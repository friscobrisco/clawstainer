components:
  python3:
    install: |
      apt-get update
      apt-get install -y software-properties-common
      add-apt-repository -y universe
      apt-get update
      apt-get install -y python3 python3-pip python3-venv
    verify: python3 --version
    tags: [language, ml]

  nodejs:
    install: |
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get install -y nodejs
    verify: node --version
    tags: [language, web]

  git:
    install: apt-get install -y git
    verify: git --version
    tags: [tool, vcs]

  curl:
    install: apt-get install -y curl
    verify: curl --version
    tags: [tool, network]

  build-essential:
    install: apt-get install -y build-essential
    verify: gcc --version
    tags: [tool, compiler]

  docker-cli:
    install: apt-get install -y docker.io
    verify: docker --version
    tags: [tool, container]

  ripgrep:
    install: apt-get install -y ripgrep
    verify: rg --version
    tags: [tool, search]

  jq:
    install: apt-get install -y jq
    verify: jq --version
    tags: [tool, json]

  hermes-agent:
    install: |
      apt-get update
      apt-get install -y curl git xz-utils
      curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash || true
    verify: test -d /root/.hermes/hermes-agent && test -f /root/.local/bin/uv
    timeout: 600
    tags: [agent, ai]

  claude-code:
    install: |
      apt-get update
      apt-get install -y curl git
      curl -fsSL https://claude.ai/install.sh | bash
    verify: claude --version
    timeout: 300
    tags: [agent, ai]

  openclaw:
    timeout: 600
    install: |
      apt-get update
      apt-get install -y curl git
      curl -fsSL https://openclaw.ai/install.sh | bash || true
      cat > /etc/systemd/system/openclaw-gateway.service << 'UNIT'
      [Unit]
      Description=OpenClaw Gateway
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/openclaw gateway
      Restart=always
      RestartSec=3
      Environment=HOME=/root
      WorkingDirectory=/root

      [Install]
      WantedBy=multi-user.target
      UNIT
      sed -i 's/^      //' /etc/systemd/system/openclaw-gateway.service
      systemctl daemon-reload
      systemctl enable openclaw-gateway
      systemctl start openclaw-gateway
    verify: openclaw --version
    tags: [agent, platform]

bundles:
  agent-default:
    components: [python3, nodejs, git, curl, jq, ripgrep]

  web-dev:
    components: [nodejs, git, build-essential, curl]

  ml:
    components: [python3, git, build-essential, curl]

  openclaw:
    components: [curl, openclaw]
